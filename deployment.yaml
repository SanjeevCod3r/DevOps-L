apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hello-app
  template:
    metadata:
      labels:
        app: hello-app
    spec:
      containers:
        - name: hello-app
          image: 439490335073.dkr.ecr.ap-south-1.amazonaws.com/hello-app:latest
          ports:
            - containerPort: 80